<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <!-- Use Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Sleek pink gradient background */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            /* Glassmorphism effect */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
            max-width: 90%;
            width: 350px;
        }

        button {
            padding: 16px 36px;
            font-size: 1.3em;
            font-weight: 700;
            color: white;
            background: #ff4b72;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 114, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 75, 114, 0.6);
        }

        #messageWrapper {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        h1 {
            color: #ff2a5f;
            font-size: 2.2em;
            margin: 0;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .name-highlight {
            font-size: 1.5em;
            display: block;
            margin-top: 5px;
            background: -webkit-linear-gradient(#ff2a5f, #ff6b8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-wrap: break-word;
        }

        p {
            color: #d81b60;
            font-size: 1.25em;
            margin: 0;
            font-weight: 400;
        }

        /* Falling Hearts */
        .heart {
            position: absolute;
            color: #ff4b72;
            animation: float linear forwards;
            z-index: 1;
            user-select: none;
        }

        @keyframes float {
            0% {
                transform: translateY(-10vh) translateX(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) translateX(20px) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="box">
        <button id="clickMe">Click me 💌</button>
        
        <div id="messageWrapper">
            <h1 id="message">I love you so much,<span class="name-highlight" id="herName"></span></h1>
            <p>You make every day brighter! ❤️</p>
        </div>
    </div>

    <script>
        const button = document.getElementById('clickMe');
        const messageWrapper = document.getElementById('messageWrapper');
        const nameElement = document.getElementById('herName');

        // You can set her name in the URL using ?name=HerName or #HerName
        // e.g. /surprise.html?name=Sarah
        const urlParams = new URLSearchParams(window.location.search);
        let name = urlParams.get('name') || window.location.hash.substring(1);
        
        if (!name) {
            name = "Beautiful"; // Fallback name
        } else {
            name = decodeURIComponent(name);
            // Titlecase the name
            name = name.charAt(0).toUpperCase() + name.slice(1);
        }
        
        nameElement.textContent = name + "!";

        button.addEventListener('click', () => {
            // Hide button and show message
            button.style.display = 'none';
            messageWrapper.style.display = 'block';
            
            // Trigger animation
            setTimeout(() => {
                messageWrapper.style.opacity = 1;
                messageWrapper.style.transform = 'translateY(0)';
            }, 50);

            // Pop confetti hearts instantly
            for (let i = 0; i < 40; i++) {
                setTimeout(() => createHeart(true), i * 50);
            }

            // Keep raining hearts
            setInterval(() => createHeart(false), 300);
        });

        function createHeart(isExplosion) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            if (isExplosion) {
                // Heart explosion effect starting from center
                heart.style.left = '50%';
                heart.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 50 + 20;
                heart.style.transform = `translate(-50%, -50%)`;
                
                // Use Web Animations API for the explosion
                const animation = heart.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*velocity}vw), calc(-50% + ${Math.sin(angle)*velocity}vh)) scale(${Math.random() + 0.5})`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 1000,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
                });
                
                animation.onfinish = () => heart.remove();
            } else {
                // Falling hearts from top
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-10vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                
                // Add tiny variations to color
                const colors = ['#ff4b72', '#ff2a5f', '#ff9a9e', '#d81b60'];
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }
            
            document.body.appendChild(heart);
        }
    </script>
</body>
</html>
